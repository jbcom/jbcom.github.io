name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-site:
    name: Static site validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert no Node build pipeline
        run: |
          test ! -e package.json
          test ! -e pnpm-lock.yaml
          test ! -d src
          test ! -d scripts/resume
          test ! -d node_modules

      - name: Validate static assets
        run: |
          test -s index.html
          test -s styles.css
          test -s script.js
          test -s public/Jon_Bogaty_Resume.docx
          test -s public/headshot.png

      - name: Check local links
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlparse

          root = Path('.')
          checked = sorted(Path('.').glob('*.html')) + sorted(Path('.').glob('*/*.html'))
          attrs = {'a': 'href', 'link': 'href', 'script': 'src', 'img': 'src'}

          class LinkParser(HTMLParser):
            def __init__(self):
              super().__init__()
              self.links = []

            def handle_starttag(self, tag, attrs_list):
              attr = attrs.get(tag)
              if not attr:
                return
              values = dict(attrs_list)
              if attr in values:
                self.links.append(values[attr])

          errors = []
          for file in checked:
            parser = LinkParser()
            parser.feed(file.read_text(encoding='utf-8'))
            for link in parser.links:
              parsed = urlparse(link)
              if parsed.scheme in {'http', 'https', 'mailto', 'tel'}:
                continue
              if link.startswith('#') or link.startswith('data:'):
                continue
              target = link.split('#', 1)[0].split('?', 1)[0]
              if not target:
                continue
              candidate = (file.parent / target.lstrip('/')).resolve()
              if not candidate.exists():
                errors.append(f'{file}: missing {link}')

          if errors:
            print('\n'.join(errors))
            raise SystemExit(1)
          PY
