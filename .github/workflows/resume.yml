name: Resume Generator

on:
  pull_request:
    paths:
      - 'src/content/resume.json'
      - 'scripts/generate-resume*.ts'
      - 'src/lib/dates.ts'
      - 'src/pages/resume.astro'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: resume-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Resume
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pandoc
        uses: pandoc/actions/setup@main

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (includes resume page)
        run: pnpm build

      - name: Generate DOCX with pandoc
        run: pandoc dist/resume/index.html -f html -t docx -o public/Jon_Bogaty_Resume.docx

      - name: Copy PDF from build output
        run: cp dist/Jon_Bogaty_Resume.pdf public/Jon_Bogaty_Resume.pdf 2>/dev/null || true

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet public/Jon_Bogaty_Resume.pdf public/Jon_Bogaty_Resume.docx; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/Jon_Bogaty_Resume.pdf public/Jon_Bogaty_Resume.docx
          git commit -m "chore: regenerate resume PDF and DOCX"
          git push

      - name: Comment on PR
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Resume PDF and DOCX have been automatically regenerated from updated source files.'
            })
