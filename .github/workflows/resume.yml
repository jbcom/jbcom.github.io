name: Resume Generator

on:
  pull_request:
    paths:
      - 'src/content/resume.ts'
      - 'scripts/resume/**'
      - 'src/lib/dates.ts'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: resume-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Resume
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@9fd676a19091d4595eefd76e4bd31c97133911f1 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      # pull_request `paths` filters match the whole PR diff, so this job
      # re-runs on its own regenerate commits. The guard + content-aware diff
      # below break that loop (the DOCX zip is not byte-deterministic).
      - name: Skip if triggered by own regenerate commit
        id: guard
        run: |
          if [ "$(git log -1 --format='%an')" = "github-actions[bot]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Compile resume DOCX
        if: steps.guard.outputs.skip != 'true'
        run: pnpm resume:build

      - name: Check for content changes
        if: steps.guard.outputs.skip != 'true'
        id: diff
        run: |
          # Compare document content, not zip bytes (zip timestamps differ
          # on every build even when the document is identical).
          new_xml=$(mktemp); old_xml=$(mktemp)
          unzip -p public/Jon_Bogaty_Resume.docx word/document.xml > "$new_xml"
          git show HEAD:public/Jon_Bogaty_Resume.docx > /tmp/old.docx 2>/dev/null \
            && unzip -p /tmp/old.docx word/document.xml > "$old_xml" 2>/dev/null \
            || : > "$old_xml"
          if cmp -s "$new_xml" "$old_xml"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            git checkout -- public/Jon_Bogaty_Resume.docx
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.guard.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/Jon_Bogaty_Resume.docx
          git commit -m "chore: regenerate resume DOCX"
          git push

      - name: Comment on PR
        if: steps.guard.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Resume DOCX has been automatically regenerated from updated source files.'
            })
