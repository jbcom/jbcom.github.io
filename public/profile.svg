<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-labelledby="title desc">
  <title id="title">Jon Bogaty profile mark</title>
  <desc id="desc">A monogram mark with the initials JB on a dark technical grid.</desc>
  <defs>
    <radialGradient id="glow" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#E8A849" stop-opacity="0.55"/>
      <stop offset="62%" stop-color="#6B8BAD" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0B0D14" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0v20" fill="none" stroke="#F0EDE8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="300" height="300" rx="150" fill="#0B0D14"/>
  <rect width="300" height="300" rx="150" fill="url(#grid)"/>
  <circle cx="108" cy="92" r="172" fill="url(#glow)"/>
  <text x="150" y="173" text-anchor="middle" font-family="Georgia, serif" font-size="92" fill="#F0EDE8" letter-spacing="2">JB</text>
  <text x="150" y="205" text-anchor="middle" font-family="Menlo, monospace" font-size="13" fill="#E8A849" letter-spacing="3">PLATFORM</text>
</svg>
